name: Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${image_name}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image summary
        shell: bash
        run: |
          {
            echo "## Docker image"
            echo
            echo "Image repository:"
            echo
            echo '```text'
            echo "${{ steps.image.outputs.name }}"
            echo '```'
            echo
            echo "Tags:"
            echo
            echo '```text'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "This pull request build only validates the image. It does not push to GHCR."
            else
              echo "Pull example:"
              echo
              echo '```bash'
              echo "docker pull ${{ steps.image.outputs.name }}:latest"
              echo '```'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
